services:
  - type: web
    name: kodam-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CRAWL_INTERVAL_MINUTES
        value: "10"
      - key: FRONTEND_URL
        sync: false
